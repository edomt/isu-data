name: autoupdate

on:
  schedule:
    - cron: "0 10 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv run scraper.py
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.csv
          git diff --staged --quiet || git commit -m "ISU: automated update" && git push
